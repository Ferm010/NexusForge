## This file contains default placeholder values for local.properties
## DO NOT add real secrets here - this file is committed to git
## Copy this to local.properties and fill in your actual values

# SDK directory (update with your SDK path)
sdk.dir=PLACEHOLDER_SDK_PATH

# Google OAuth Web Client ID (get from Firebase Console)
# Steps:
# 1. Go to https://console.firebase.google.com
# 2. Select your project
# 3. Go to Project Settings
# 4. Copy Web Client ID from OAuth 2.0 Client IDs section
WEB_CLIENT_ID=PLACEHOLDER_WEB_CLIENT_ID

# Keystore passwords (generate new keystore and update these)
# Generate keystore with:
# keytool -genkey -v -keystore nexusforge.keystore \
#   -alias nexusforge -keyalg RSA -keysize 2048 -validity 10000 \
#   -storepass YOUR_PASSWORD -keypass YOUR_PASSWORD
# 
# IMPORTANT: Use strong passwords (min 16 chars, mixed case, numbers, symbols)
KEYSTORE_PASSWORD=PLACEHOLDER_KEYSTORE_PASSWORD
KEY_PASSWORD=PLACEHOLDER_KEY_PASSWORD
